name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/docs-pages-layout.mjs"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/docs-pages-layout.mjs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build VitePress → gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          # Project site: https://<owner>.github.io/spec-driven-development/
          DOCS_BASE: /spec-driven-development/
        run: pnpm docs:build

      - name: Publish to gh-pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          force_orphan: true
          enable_jekyll: false
