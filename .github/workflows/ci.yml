name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, test & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # pnpm must be on PATH before setup-node cache / install
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          # v5 defaults to package-manager-cache:true which looks for pnpm too early
          package-manager-cache: false

      - name: Verify pnpm
        run: |
          command -v pnpm
          pnpm --version
          node --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit)
        run: pnpm test

      - name: CLI smoke (init → new → next → complete)
        run: bash scripts/cli-smoke.sh

  npm-pack:
    name: npm pack (dry)
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          package-manager-cache: false

      - name: Install & build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Pack packages
        run: |
          pnpm --filter @structured-vibe-coding/core exec npm pack --dry-run
          pnpm --filter @structured-vibe-coding/cli exec npm pack --dry-run
