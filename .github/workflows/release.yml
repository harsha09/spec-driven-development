name: Release (CD)

# Publishes npm packages and attaches VSIX when you create a GitHub Release
# or run this workflow manually.
#
# Required repository secret: NPM_TOKEN
#
# If package.json version is already on npm, auto patch-bumps until free.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag"
        required: false
        default: "latest"
      skip_npm:
        description: "Skip npm publish (VSIX only)"
        type: boolean
        required: false
        default: false
      bump:
        description: "Force version bump before publish"
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build, typecheck, test
        run: |
          pnpm build
          pnpm typecheck
          pnpm test

      - name: CLI smoke
        run: bash scripts/cli-smoke.sh

  publish-npm:
    name: Publish to npm
    needs: quality
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_npm != true)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          package-manager-cache: false

      - name: Install & build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Check NPM_TOKEN
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::Secret NPM_TOKEN is not set."
            exit 1
          fi

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          echo "always-auth=true" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Optional forced bump
        if: github.event_name == 'workflow_dispatch' && inputs.bump != 'none'
        run: node scripts/bump-version.mjs ${{ inputs.bump }}

      - name: Ensure version is not already on npm
        id: ver
        run: node scripts/ensure-unpublished-version.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve npm tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.npm_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish packages
        run: |
          set -euo pipefail
          echo "Commit: $(git rev-parse --short HEAD)"
          echo "Workflow file expects publish-npm.sh (not raw pnpm --filter publish)"
          test -x scripts/publish-npm.sh || chmod +x scripts/publish-npm.sh
          bash scripts/publish-npm.sh "${{ steps.tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}


      - name: Commit version bump if needed
        run: |
          set -euo pipefail
          VERSION="$(node -e "process.stdout.write(require('./packages/core/package.json').version)")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/core/package.json packages/cli/package.json packages/vscode/package.json || true
          if git diff --cached --quiet; then
            echo "No version file changes"
          else
            git commit -m "chore(release): v${VERSION} [skip release]"
            git push origin HEAD:${{ github.ref_name }}
          fi
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Cleanup auth
        if: always()
        run: rm -f .npmrc

      - name: Summary
        run: |
          VERSION="$(node -e "process.stdout.write(require('./packages/core/package.json').version)")"
          echo "## npm publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Install: \`npm i -g @structured-vibe-coding/cli@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

  package-vsix:
    name: Package VSIX
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          package-manager-cache: false

      - name: Install, build, package
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm package:vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: structured-vibe-sdd-vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error

      - name: Attach VSIX to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: packages/vscode/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
